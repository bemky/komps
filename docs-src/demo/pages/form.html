<!--
title: Form
-->
<style>
    .demo-layout {
        display: flex;
        gap: 1em;
    }
    .form-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.75em;
    }
    .form-container label {
        font-weight: 600;
        font-size: 0.9em;
    }
    .form-container input,
    .form-container select,
    .form-container textarea {
        display: block;
        width: 100%;
        padding: 0.4em;
        box-sizing: border-box;
    }
    .data-output {
        flex: 1;
        background: #1a1a2e;
        color: #4ade80;
        padding: 1em;
        border-radius: 0.5em;
        font-family: monospace;
        font-size: 0.85em;
        word-break: break-all;
        white-space: pre-wrap;
    }
</style>

<div class="demo-layout">
    <div class="form-container" id="form-container"></div>
    <div class="data-output" id="data-output"></div>
</div>

<script type="module">
    import Form from './lib/komps/form.js';

    class Player {
        _attributes = {};
        _listeners = [];
        constructor(attrs) {
            ['name','allStar','position','bats','born','bio','captain'].forEach(k => {
                Object.defineProperty(this, k, {
                    get: () => this._attributes[k],
                    set: (v) => { this._attributes[k] = v; this.dispatchEvent('change'); }
                });
            });
            Object.keys(attrs || {}).forEach(k => { this._attributes[k] = attrs[k]; });
        }
        addEventListener(type, listener) { this._listeners.push([type, listener]); }
        dispatchEvent(type) { this._listeners.forEach(([t, l]) => { if (t === type) l(); }); }
        async save() { return true; }
    }

    const player = new Player({
        name: 'Corey Seager',
        born: new Date('1986-03-06'),
        bats: 'left',
        position: 'SS',
        allStar: true,
        bio: 'Super badass dood.',
        captain: 'no'
    });

    function renderAttributes() {
        document.getElementById('data-output').textContent = JSON.stringify(player._attributes, null, 2);
    }
    player.addEventListener('change', renderAttributes);
    renderAttributes();

    const formEl = Form.create(player, {
        content: f => [
            f.label('name'),
            f.text('name'),
            f.label('born'),
            f.date('born'),
            f.label('bats'),
            f.select('bats', { options: ['left', 'right'] }),
            f.label('position'),
            f.select('position', { options: ['1B', '2B', '3B', 'SS'] }),
            f.label('bio'),
            f.textarea('bio'),
            f.label('captain'),
            f.checkbox('captain', { value: 'yes' }),
            f.submit('Save')
        ],
        afterSubmit: rec => console.log('submitted', rec)
    });
    document.getElementById('form-container').append(formEl);
</script>

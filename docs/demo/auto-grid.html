<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoGrid – Komps Demo</title>
    <link rel="stylesheet" href="demo.css">
    <script type="importmap">
        {
            "imports": {
                "dolla": "./vendor/dolla/dolla.js",
                "@floating-ui/dom": "./vendor/floating-ui-dom.mjs",
                "@floating-ui/core": "./vendor/floating-ui-core.mjs",
                "@floating-ui/utils": "./vendor/floating-ui-utils.mjs",
                "@floating-ui/utils/dom": "./vendor/floating-ui-utils-dom.mjs"
            }
        }
    </script>
</head>
<body>
<main>
    <style>
    auto-grid {
        padding: 1em;
        gap: 1em;
    }
    auto-grid > div {
        background: white;
        border-radius: 0.25em;
        padding: 0.25em 0.75em;
    }
</style>

<auto-grid>
    <div>lorem</div>
    <div>Lorem ipsum dolor</div>
    <div>sit amet, consectetur adipisicing</div>
    <div>elit</div>
    <div>sed do</div>
    <div>eiusmod</div>
    <div>tempor incididunt ut labore et dolore</div>
    <div>magna aliqua. Ut enim</div>
    <div>ad minim</div>
    <div>veniam, quis nostrud</div>
    <div>exercitation</div>
    <div>ullamco laboris nisi ut aliquip ex ea</div>
    <div>1</div>
    <div>commodo consequat.</div>
    <div>Duis aute irure dolor</div>
</auto-grid>

<script type="module">
    import './lib/komps/auto-grid.js';
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>
</body>
</html>

        canvas,

            komp-spreadsheet-inputcell {
                background: white;
            }
        
            komp-table-header-cell,
            komp-table-cell,
            komp-spreadsheet-header-cell,
            komp-spreadsheet-cell {
                padding: 0.5em 1em;
                outline: 1px solid #ede8f5;
            }
            komp-table-row {
                outline: 1px solid #ede8f5;
            }

              background: rgb(248,248,251);
              font-weight: bold;
              text-transform: uppercase;
            }

        .flex-col { flex-direction: column; }

            font-size: 1em;
            text-decoration: none;

        .uniformButton:hover { background: #eee; }
        .uniformButton.-green {
            background: #22c55e;

            border-color: #16a34a;

        .uniformInputs input:focus,
        .uniformInputs select:focus,
        .uniformInputs textarea:focus {
            outline: 2px solid #6366f1;
            outline-offset: -1px;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: var(--transform);
            }
        
            to {
                opacity: 1;
                transform: none;
            }
        }
        @keyframes fadeout {
            from {
                opacity: 1;
                transform: none;
            }
        
            to {
                opacity: 0;
                transform: var(--transform);
            }

    auto-grid {
        padding: 1em;
        gap: 1em;
    }

        background: white;
        border-radius: 0.25em;
        padding: 0.25em 0.75em;
    }
</style>

<auto-grid>
    <div>lorem</div>
    <div>Lorem ipsum dolor</div>

    <div>ad minim</div>
    <div>veniam, quis nostrud</div>
    <div>exercitation</div>
    <div>ullamco laboris nisi ut aliquip ex ea</div>
    <div>1</div>
    <div>commodo consequat.</div>
    <div>Duis aute irure dolor</div>
</auto-grid>

<script type="module">
    import './lib/komps/auto-grid.js';
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Floater – Komps Demo</title>
    <link rel="stylesheet" href="demo.css">
    <script type="importmap">
        {
            "imports": {
                "dolla": "./vendor/dolla/dolla.js",
                "@floating-ui/dom": "./vendor/floating-ui-dom.mjs",
                "@floating-ui/core": "./vendor/floating-ui-core.mjs",
                "@floating-ui/utils": "./vendor/floating-ui-utils.mjs",
                "@floating-ui/utils/dom": "./vendor/floating-ui-utils-dom.mjs"
            }
        }
    </script>
</head>
<body>
<main>
    <style>
    main {
        min-height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #anchor {
        border: 2px dashed #aaa;
        display: inline-block;
        padding: 0.75em 1.5em;
        background: white;
        border-radius: 0.25em;
    }
    komp-floater {
        background: rgba(30, 30, 30, 0.85);
        color: white;
        padding: 0.5em 1em;
        border-radius: 0.5em;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
</style>

<div id="anchor">This is the anchor</div>
<komp-floater anchor="#anchor">FLOATER</komp-floater>

<script type="module">
    import './lib/komps/floater.js';
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tooltip – Komps Demo</title>
    <link rel="stylesheet" href="demo.css">
    <script type="importmap">
        {
            "imports": {
                "dolla": "./vendor/dolla/dolla.js",
                "@floating-ui/dom": "./vendor/floating-ui-dom.mjs",
                "@floating-ui/core": "./vendor/floating-ui-core.mjs",
                "@floating-ui/utils": "./vendor/floating-ui-utils.mjs",
                "@floating-ui/utils/dom": "./vendor/floating-ui-utils-dom.mjs"
            }
        }
    </script>
</head>
<body>
<main>
    <style>
    main {
        min-height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #anchor {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: #7c3aed;
        color: white;
        border-radius: 50%;
        cursor: help;
        font-weight: bold;
    }
    komp-tooltip {
        background: rgba(30, 30, 30, 0.85);
        color: white;
        padding: 0.5em 1em;
        font-size: 0.9em;
        border-radius: 0.5em;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        max-width: 250px;
    }
</style>

<div style="display: flex; align-items: center; gap: 0.75em;">
    <div id="anchor">?</div>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Hover This
</div>

<script type="module">
    import Tooltip from './lib/komps/tooltip.js';

    new Tooltip({
        anchor: document.getElementById('anchor'),
        content: 'Lorem ipsum dolor sit amet, consectetur adipisicing elit.'
    });
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>
</body>
</html>

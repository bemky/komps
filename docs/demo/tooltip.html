        html, body{
            margin: 0;
            padding: 0;
        }
        html{
            font-size: 14px;
        }
        body{
            font-size: 1rem;
        }
        main {
            padding: 2em;
        }
        *{
            box-sizing: border-box;
        }
        a{
            color: color('blue');
            &:hover{
                color: color('blue-60');
            }
        }
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p,
        ul,
        ol,
        dl,
        pre{
            margin: 0;
        }
        
        table{
            background-color: transparent;
            border-collapse: collapse;
            td, th{
                display: table-cell;
                text-align: left;
            }
        }
        
        fieldset{
            margin: 0;
            padding: 0;
            border: none;
        }
        
        textarea{
            resize: vertical;
        }
        
        input,
        select,
        textarea,
        button{
            border-width: 1px;
            margin: 0;
            line-height: inherit;
            font: inherit;
            text-align: inherit;
            text-transform: inherit;
            letter-spacing: inherit;
        }
        
        [hidden] {
            display: none !important;
        }
        
        a,
        button{
            cursor: pointer;
        }
        button{
            font-family: map-get($uniform_configs, 'base-font');
            font-size: 1em;
        }
        
        img,
        svg,
        video,
        canvas,
        audio,
        iframe,
        embed,
        object {
          display: block;
          vertical-align: middle;
        }
        
        button {
            padding: 0.5em 1em;
            font-size: 1rem;
            cursor: pointer;
        }
        
        komp-table,
        komp-spreadsheet {
            gap: 1px;
            border-radius: 0.35em;
            font-size: 1rem;
            
            komp-table-header-cell,
            komp-table-cell,
            komp-spreadsheet-cell,
            komp-spreadsheet-header-cell,
            komp-spreadsheet-inputcell {
                background: white;
            }
        
            komp-table-header-cell,
            komp-table-cell,
            komp-spreadsheet-header-cell,
            komp-spreadsheet-cell {
                padding: 0.5em 1em;
                outline: 1px solid color('purple-10');
            }
            komp-table-row {
                outline: 1px solid color('purple-10');
            }
        
            komp-table-header-cell,
            komp-spreadsheet-header-cell {
              background: rgb(248,248,251);
              font-weight: bold;
              text-transform: uppercase;
            }
        }
        komp-table-row {
            &:nth-child(2n) {
                komp-spreadsheet-cell {
                    background: lighten(color('purple-10'), 8);
                }
            }
        }
        @keyframes fadein {
            from {
                opacity: 0;
                transform: var(--transform);
            }
        
            to {
                opacity: 1;
                transform: none;
            }
        }
        @keyframes fadeout {
            from {
                opacity: 1;
                transform: none;
            }
        
            to {
                opacity: 0;
                transform: var(--transform);
            }
        }

    <script type="importmap">
        {
            "imports": {
                "dolla": "./vendor/dolla/dolla.js",

<body>
<main>
    <style>
    main {
        min-height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #anchor {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: #7c3aed;
        color: white;
        border-radius: 50%;
        cursor: help;
        font-weight: bold;
    }
    komp-tooltip {
        background: rgba(30, 30, 30, 0.85);
        color: white;
        padding: 0.5em 1em;
        font-size: 0.9em;
        border-radius: 0.5em;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        max-width: 250px;
    }
</style>

<div style="display: flex; align-items: center; gap: 0.75em;">
    <div id="anchor">?</div>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Hover This
</div>

<script type="module">
    import Tooltip from './lib/komps/tooltip.js';

    new Tooltip({
        anchor: document.getElementById('anchor'),
        content: 'Lorem ipsum dolor sit amet, consectetur adipisicing elit.'
    });
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>
</body>

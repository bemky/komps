<!--
title: Masonry
-->
<style>
    .demo-container {
        position: relative;
        border: 1px solid #e2e2ea;
        border-radius: 0.5em;
        background: white;
        padding: 1em;
    }
    komp-masonry {
        gap: 8px;
        block-size: 600px;
    }
    komp-masonry > .cell {
        background: #ede8f5;
        border-radius: 0.25em;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25em;
        color: #5e5ce6;
        user-select: none;
    }
    .hint {
        text-align: center;
        padding: 0.5em;
        font-size: 0.85em;
        color: #888;
    }
</style>

<p class="hint">Drag cell edges or row dividers to resize. Drag a cell to a new row to redistribute.</p>
<div class="demo-container">
    <komp-masonry id="m"
        cellPattern="3 3 6, 6 6, 7 5, 12"
        rowPattern="1fr 1fr 0.5fr 1fr"
        resizable
        reorderable>
    </komp-masonry>
</div>

<script type="module">
    import Masonry from './lib/komps/masonry.js';
    import { createElement } from 'dolla';

    const m = document.getElementById('m');
    for (let i = 1; i <= 8; i++) {
        m.append(createElement('div', { class: 'cell', content: String(i) }));
    }
    m.render();
</script>

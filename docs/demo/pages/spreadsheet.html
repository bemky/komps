<!--
title: Spreadsheet
-->
<style>
    main {
        height: 500px;
        overflow: hidden;
    }
    komp-spreadsheet {
        width: 100%;
        height: 100%;
    }
</style>

<div id="container" style="width: 100%; height: 100%;"></div>

<script type="module">
    import Spreadsheet from './lib/komps/spreadsheet.js';

    const response = await fetch("/texas-rangers-roster.json");
    const data = await response.json();

    document.getElementById('container').append(new Spreadsheet({
        readonly: r => r['Name'] == 'Adolis Garcia',
        data: data,
        columns: [{
            attribute: 'Name',
            resize: false,
            reorder: false,
            frozen: true,
            type: 'readonly',
            copy: false,
            paste: false
        }, {
            attribute: 'TEAM',
            frozen: true,
            copy: false,
            paste: false
        }, {
            attribute: 'CAPTAIN',
            type: 'checkbox'
        }, {
            attribute: 'POS',
            type: 'select',
            options: ['C', '1B', '2B', '3B', 'SS', 'LF', 'RF', 'CF', 'P']
        }, {
            attribute: "RBI",
            type: 'number'
        }, {
            attribute: "AVG",
            type: 'number'
        }, {
            attribute: "DOB",
            type: 'date'
        }, {
            attribute: "OPS",
            type: 'number'
        }, {
            attribute: "WAR",
            type: 'number'
        }]
    }));
</script>

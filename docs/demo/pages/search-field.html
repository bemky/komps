<!--
title: SearchField
-->
<style>
    main {
        min-height: 350px;
    }
    komp-notification {
        background: rgba(59, 130, 246, 0.9);
        color: white;
        font-weight: bold;
        padding: 0.5em 1em;
        border-radius: 0.5em;
        border: 1px solid #2563eb;
    }
    .komp-search-field-results {
        border-bottom-left-radius: 0.35em;
        border-bottom-right-radius: 0.35em;
        overflow:hidden;
        &:empty {
            display: none;
        }
        button, a{
            cursor: pointer;
            appearance: none;
            outline: none;
            border: 1px solid transparent;
            background: none;
            width: 100%;
            padding: 0.5em;
            display: block;
            text-align: left;
            text-decoration: none;
            color: inherit;
            &:hover{
                background: rgba(0,0,0, 0.1);
            }
            &[aria-pressed]{
                background: hsla(219, 69%, 46%, 0.25);
                color: #245ec7;
            }
            &:focus,
            &.focus {
                border: 1px dotted #245ec7;
                color: #245ec7;
            }
            &.active {
                background: hsl(219, 69%, 90%);
                color: hsl(219, 69%, 90%);
            }
        }
        &.compact {
            button, a {
                padding-block: 0.25em;
            }
        }
    }
</style>

<div id="container" class=" bg-white rounded pad shadow uniformInputs flex gap align-center">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class=""><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
</div>

<script type="module">
    import SearchField from './lib/komps/search-field.js';
    import NotificationCenter from './lib/komps/notification-center.js';

    const notificationCenter = new NotificationCenter();
    document.body.append(notificationCenter);

    document.getElementById('container').append(new SearchField({
        placeholder: 'Search Books...',
        class: 'width-full',
        input: {
            class: 'width-full',
            autofocus: true
        },
        search: async (query) => {
            const response = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=5`);
            const data = await response.json();
            return data.docs;
        },
        result: (doc) => {
            const author = doc.author_name ? doc.author_name[0] : 'Unknown';
            const year = doc.first_publish_year || '';
            return `<strong>${doc.title}</strong> <span style="opacity: 0.6">by ${author}${year ? ` (${year})` : ''}</span>`;
        },
        select: (doc) => {
            notificationCenter.add(`Selected: ${doc.title}`);
            return true;
        }
    }));
</script>

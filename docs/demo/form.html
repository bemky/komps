<body>
<main>
    <style>
    .demo-layout {
        display: flex;
        gap: 1em;
    }
    .form-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.75em;
    }
    .form-container label {
        font-weight: 600;
        font-size: 0.9em;
    }
    .form-container input,
    .form-container select,
    .form-container textarea {
        display: block;
        width: 100%;
        padding: 0.4em;
        box-sizing: border-box;
    }
    .data-output {
        flex: 1;
        background: #1a1a2e;
        color: #4ade80;
        padding: 1em;
        border-radius: 0.5em;
        font-family: monospace;
        font-size: 0.85em;
        word-break: break-all;
        white-space: pre-wrap;
    }
</style>

<div class="flex border-purple-20 width-full justify-content-center gap-2x">
    <div class="flex justify-content-center">
        <div class="form-container flex-none uniformInputs bg-white rounded-xl border">
        </div>
    </div>
    <div class="data pad-2x bg-gray-90 text-green rounded-xl flex flex-col gap"></div>
</div>
<script type="module">
    import { createElement } from 'dolla';
    import Form from './lib/komps/form.js';
    import NotificationCenter from './lib/komps/notification-center.js';
    
    class Player {
        _attributes = {}
        _listeners = []
        constructor (attrs) {
            ['name','allStar','position','bats','preferences','born','bio','favoriteMoment','captain'].forEach(k => {
                Object.defineProperty(this, k, {
                    get: () => this._attributes[k],
                    set: (v) => { this._attributes[k] = v; this.dispatchEvent('change') }
                })
            })
            Object.keys(attrs || {}).forEach(k => { this._attributes[k] = attrs[k] })
        }
        addEventListener (type, listener) { this._listeners.push([type, listener]) }
        dispatchEvent (type) { this._listeners.forEach(([t, l]) => { if (t === type) l() }) }
        async save () { return true }
    }

    const player = new Player({
        name: 'Corey Seager',
        born: new Date('1986-03-06'),
        bats: 'left', position: 'SS',
        position: 'SS'    })

    function renderAttributes () {
        const target = document.querySelector('.data')
        target.innerHTML = ''
        Object.keys(player._attributes).forEach(attr => {
            const v = player._attributes[attr]
            target.append(createElement({
                content: [{
                    class: 'text-bold',
                    content: attr
                }, {
                    class: 'text-white',
                    content: typeof v == 'object' ? JSON.stringify(v) : v.toLocaleString()
                }]
            }))
        })
    } 
    player.addEventListener('change', renderAttributes)

    document.addEventListener('DOMContentLoaded', () => {
        const notificationCenter = new NotificationCenter()
        document.body.append(notificationCenter)
        
        renderAttributes()
        const formEl = Form.create(player, {
            content: f => [
                {
                    class: 'flex flex-wrap gap-xl pad-2x',
                    content: [{
                        class: 'space-v',
                        content: [
                            {
                                content: [
                                    f.label('name'),
                                    f.text('name')
                                ]
                            },
                            {
                                content: [
                                    f.label('born'),
                                    f.date('born')
                                ]
                            }
                        ]
                    },
                    {
                        class: 'space-v min-width-100-px',
                        content: [
                            {
                                content: [
                                    f.label('bats'),
                                    f.select('bats', { options: ['left','right'] })
                                ]
                            },
                            {
                                content: [
                                    f.label('position'),
                                    f.select('position', { options: ['1B','2B','3B','SS'] })
                                ]
                            }
                        ]
                    }].map(fields => {
                        fields.content.forEach(field => {
                            field.content[0].classList.add("block", "text-bold", "margin-bottom-1/2x")
                            field.content[1].classList.add('width-full')
                            return field
                        })
                        return fields
                    })
                },
                {
                    class: 'border-top border-purple-10 pad-h-2x pad-v text-right',
                    content: f.submit('Save', {class: 'uniformButton -green'})
                }
            ],
            afterSubmit: rec => {
                notificationCenter.add('Saved!', {
                    class: 'text-bold bg-green bg-opacity-80 rounded border-green-70 border text-white pad-h pad-v-1/2x bottom-0 right-0'
                })
            }
        })
        document.querySelector('.form-container').append(formEl)
    })
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>

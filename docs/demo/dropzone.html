<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dropzone – Komps Demo</title>
    <link rel="stylesheet" href="demo.css">
    <script type="importmap">
        {
            "imports": {
                "dolla": "./vendor/dolla/dolla.js",
                "@floating-ui/dom": "./vendor/floating-ui-dom.mjs",
                "@floating-ui/core": "./vendor/floating-ui-core.mjs",
                "@floating-ui/utils": "./vendor/floating-ui-utils.mjs",
                "@floating-ui/utils/dom": "./vendor/floating-ui-utils-dom.mjs"
            }
        }
    </script>
</head>
<body>
<main>
    <style>
    komp-dropzone > * {
        height: 120px;
        width: 240px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: white;
        border: 2px dashed #aaa;
        border-radius: 0.5em;
        color: #666;
    }
</style>

<div id="container" style="text-align: center;"></div>

<script type="module">
    import Dropzone from './lib/komps/dropzone.js';

    document.getElementById('container').append(new Dropzone({
        onFileDrop: (files) => console.log('Dropped:', files),
        content: {
            content: 'Drag Something Here'
        }
    }));
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NotificationCenter – Komps Demo</title>
    <link rel="stylesheet" href="demo.css">
    <script type="importmap">
        {
            "imports": {
                "dolla": "./vendor/dolla/dolla.js",
                "@floating-ui/dom": "./vendor/floating-ui-dom.mjs",
                "@floating-ui/core": "./vendor/floating-ui-core.mjs",
                "@floating-ui/utils": "./vendor/floating-ui-utils.mjs",
                "@floating-ui/utils/dom": "./vendor/floating-ui-utils-dom.mjs"
            }
        }
    </script>
</head>
<body>
<main>
    <style>
    main {
        min-height: 200px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    button {
        padding: 0.75em 1.5em;
        font-size: 1.1em;
        cursor: pointer;
    }
    komp-notification {
        background: rgba(34, 197, 94, 0.9);
        color: white;
        font-weight: bold;
        padding: 0.5em 1em;
        border-radius: 0.5em;
        border: 1px solid #16a34a;
    }
</style>

<button id="demo-btn">Click Me</button>

<script type="module">
    import NotificationCenter from './lib/komps/notification-center.js';

    const messages = [
        'Success!',
        'You did it!',
        'Look at us',
        'Hello!',
        'Pretty simple, eh?',
        '<p>Lorem ipsum dolor sit amet.</p>'
    ];

    const notificationCenter = new NotificationCenter();
    document.body.append(notificationCenter);

    document.getElementById('demo-btn').addEventListener('click', () => {
        notificationCenter.add(messages[Math.floor(Math.random() * messages.length)]);
    });
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>
</body>
</html>

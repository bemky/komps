<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Input – Komps Demo</title>
    <link rel="stylesheet" href="demo.css">
    <script type="importmap">
        {
            "imports": {
                "dolla": "./vendor/dolla/dolla.js",
                "@floating-ui/dom": "./vendor/floating-ui-dom.mjs",
                "@floating-ui/core": "./vendor/floating-ui-core.mjs",
                "@floating-ui/utils": "./vendor/floating-ui-utils.mjs",
                "@floating-ui/utils/dom": "./vendor/floating-ui-utils-dom.mjs"
            }
        }
    </script>
</head>
<body>
<main>
    <style>
    .demo-layout {
        display: flex;
        gap: 1em;
    }
    .input-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.75em;
    }
    .input-container label {
        display: block;
        font-weight: 600;
        font-size: 0.9em;
    }
    .input-container input,
    .input-container select,
    .input-container textarea {
        display: block;
        width: 100%;
        padding: 0.4em;
        box-sizing: border-box;
    }
    .data-output {
        flex: 1;
        background: #1a1a2e;
        color: #4ade80;
        padding: 1em;
        border-radius: 0.5em;
        font-family: monospace;
        font-size: 0.85em;
        word-break: break-all;
        white-space: pre-wrap;
    }
    .flex {
        display: flex;
        border-purple-20: 
    }
    .flex-none {
        flex: 0 0 auto;
    }
    .width-full {
        width: 100%
    }
    .width-1\//2 {
        width: 50%;
    }
    .pad-2x {
        padding: 2em;
    }
    .space-v {
        & > * {
            margin-bottom: 1em;
            &:last-child {
                margin-bottom: 0;
            }
        }
    }
    .justify-content-center {
        justify-content: center;
    }
    .justify-content-between {
        justify-content: space-between;
    }
</style>

<div class="flex width-full justify-content-center gap-2x">
    <div class="space-v flex justify-content-center">
        <div class="uniformInputs bg-white rounded-xl border pad-2x flex flex-col gap-xl">
            <div>
                <label class="block text-bold margin-bottom-1/2x">Name</label>
                <input type="text" class="width-full" name="name" />
            </div>
            <div>
                <label class="block text-bold margin-bottom-1/2x">Birthdate</label>
                <input type="date" class="width-full" name="born" />
            </div>
            <div>
                <label class="block text-bold">
                    <input type="checkbox" name="allStar" />
                    All Star
                </label>
            </div>
            
            <div>
                <label class="text-bold margin-bottom-1/2x">Bat</label>
                <div class="flex gap">
                    <label class="block">
                        <input type="radio" name="bats" value="left" />
                        Bats Left
                    </label>
                    <label class="block">
                        <input type="radio" name="bats" value="right" />
                        Bats Right
                    </label>
                </div>
            </div>
            <div>
                <label class="block text-bold margin-bottom-1/2x">Position</label>
                <select name="position" data-blank="true" class="width-full">
                    <option>1B</option>
                    <option>2B</option>
                    <option>3B</option>
                    <option>SS</option>
                </select>
            </div>
            <div>
                <label class="block text-bold margin-bottom-1/2x">Snack Preferences</label>
                <select name="preferences[snacks]" multiple class="width-full">
                    <option value="seeds">Sunflower Seeds</option>
                    <option value="snickers">Snickers</option>
                    <option value="chips">Chips</option>
                </select>
            </div>
            <div>
                <label class="block text-bold margin-bottom-1/2x">Bio</label>
                <textarea name="bio" class="width-full"></textarea>
            </div>
            <div>
                <label class="block text-bold margin-bottom-1/2x">Favorite Moment in History</label>
                <input type="datetime-local" name="farvoriteMoment" class="width-full" />
            </div>
            <div>
                <label class="block text-bold margin-bottom-1/2x">Actions</label>
                <button name="captain" value="hell yeah!" type="button" class="uniformButton">
                    Promote to Captain
                </button>
            </div>
        </div>
    </div>
    <div class="data pad-2x bg-gray-90 text-green rounded-xl flex flex-col gap-xl"></div>
</div>
<script type="module">
    import Input from './lib/komps/input.js';
    import { createElement } from 'dolla';
    
    class Player {
        _attributes = {}
        _listeners = []
        constructor (attrs) {
            ['name', 'allStar', 'position', 'bats', 'preferences', 'born', 'bio', 'farvoriteMoment', 'captain'].forEach(k => {
                Object.defineProperty(this, k, {
                    get: () => this._attributes[k],
                    set: (v) => {
                        this._attributes[k] = v
                        this.dispatchEvent('change');
                    }
                })
            })
            Object.keys(attrs).forEach(k => {
                this._attributes[k] = attrs[k]
            })
        }
        
        addEventListener (type, listener) {
            this._listeners.push([type, listener])
        }

        dispatchEvent (type) {
            this._listeners.forEach(listener => {
                if (listener[0] == type) {
                    listener[1]()
                }
            })
        }
    }

    const player = new Player({
        name: 'Corey Seager',
        born: new Date('1986-03-06'),
        bats: 'left', position: 'SS',
        allStar: true,
        preferences: {
            snacks: ['snickers', 'chips']
        },
        bio: 'Super badass dood.',
        farvoriteMoment: new Date('2023-11-04T04:12:00'),
        captain: 'no'
    })
    player.addEventListener('change', () => {
        renderAttributes()
    })

    function renderAttributes () {
        const target = document.querySelector('.data')
        target.innerHTML = ''
        Object.keys(player._attributes).forEach(attr => {
            const v = player._attributes[attr]
            target.append(createElement({
                content: [{
                    class: 'text-bold',
                    content: attr
                }, {
                    class: 'text-white',
                    content: typeof v == 'object' ? JSON.stringify(v) : v.toLocaleString()
                }]
            }))
        })
    } 

    document.addEventListener('DOMContentLoaded', () => {
        renderAttributes()
        document.querySelectorAll('input, select, textarea, button').forEach(input => {
            let type = input.type
            if (input.tagName == "SELECT") { type = "select" }
            input.replaceWith(Input.create(type, {
                record: player,
                attribute: input.name.includes('[') ? input.name.replace(/\]$/, '').split(/\]?\[/) : input.name,
                name: input.name,
                options: Array.from(input.querySelectorAll('option')).map(x => x.value ? [x.value, x.innerText] : x.innerText),
                value: input.value == '' ? undefined : input.value,
                multiple: input.multiple,
                includeBlank: input.dataset.blank,
                class: input.getAttribute('class'),
                content: input.tagName == "BUTTON" ? input.textContent : null
            }))
        })
    })
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>
</body>
</html>

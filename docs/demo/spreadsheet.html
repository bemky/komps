<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spreadsheet – Komps Demo</title>
    <link rel="stylesheet" href="demo.css">
    <script type="importmap">
        {
            "imports": {
                "dolla": "./vendor/dolla/dolla.js",
                "@floating-ui/dom": "./vendor/floating-ui-dom.mjs",
                "@floating-ui/core": "./vendor/floating-ui-core.mjs",
                "@floating-ui/utils": "./vendor/floating-ui-utils.mjs",
                "@floating-ui/utils/dom": "./vendor/floating-ui-utils-dom.mjs"
            }
        }
    </script>
</head>
<body>
<main>
    <style>
    main {
        height: 500px;
        overflow: hidden;
    }
    komp-spreadsheet {
        width: 100%;
        height: 100%;
    }
</style>

<div id="container" style="width: 100%; height: 100%;"></div>

<script type="module">
    import Spreadsheet from './lib/komps/spreadsheet.js';

    const response = await fetch("/texas-rangers-roster.json");
    const data = await response.json();

    document.getElementById('container').append(new Spreadsheet({
        data: data,
        columns: [{
            attribute: 'Name',
            resize: false,
            reorder: false,
            frozen: true,
            type: 'readonly',
            copy: false,
            paste: false
        }, {
            attribute: 'TEAM',
            frozen: true,
            copy: false,
            paste: false
        }, {
            attribute: 'CAPTAIN',
            type: 'checkbox'
        }, {
            attribute: 'POS',
            type: 'select',
            options: ['C', '1B', '2B', '3B', 'SS', 'LF', 'RF', 'CF', 'P']
        }, {
            attribute: "RBI",
            type: 'number'
        }, {
            attribute: "AVG",
            type: 'number'
        }, {
            attribute: "DOB",
            type: 'date'
        }, {
            attribute: "OPS",
            type: 'number'
        }, {
            attribute: "WAR",
            type: 'number'
        }]
    }));
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>
</body>
</html>

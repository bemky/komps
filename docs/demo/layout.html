<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}} – Komps Demo</title>
    <link rel="stylesheet" href="demo.css">
    <script type="importmap">
        {
            "imports": {
                "dolla": "./vendor/dolla/index.js",
                "@floating-ui/dom": "./vendor/floating-ui-dom.mjs",
                "@floating-ui/core": "./vendor/floating-ui-core.mjs",
                "@floating-ui/utils": "./vendor/floating-ui-utils.mjs",
                "@floating-ui/utils/dom": "./vendor/floating-ui-utils-dom.mjs"
            }
        }
    </script>
</head>
<body>
<main>
    {{body}}
</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>
</body>
</html>

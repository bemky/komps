<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Table – Komps Demo</title>
    <link rel="stylesheet" href="demo.css">
    <script type="importmap">
        {
            "imports": {
                "dolla": "./vendor/dolla/dolla.js",
                "@floating-ui/dom": "./vendor/floating-ui-dom.mjs",
                "@floating-ui/core": "./vendor/floating-ui-core.mjs",
                "@floating-ui/utils": "./vendor/floating-ui-utils.mjs",
                "@floating-ui/utils/dom": "./vendor/floating-ui-utils-dom.mjs"
            }
        }
    </script>
</head>
<body>
<main>
    <style>
    komp-table {
        border-radius: 0.5em;
        overflow: hidden;
    }
</style>

<div id="container"></div>

<script type="module">
    import Table from './lib/komps/table.js';

    document.getElementById('container').append(new Table({
        resize: true,
        data: [{
            name: "Corey Seager",
            team: "Texas Rangers",
            ops: 1.023,
            avg: 0.311,
            positions: ["SS"]
        }, {
            name: "Marcus Semien",
            team: "Texas Rangers",
            ops: 0.823,
            avg: 0.283,
            positions: ["2B"]
        }, {
            name: "Adolis Garcia",
            team: "Texas Rangers",
            ops: 0.789,
            avg: 0.245,
            positions: ["CF", "RF"]
        }],
        columns: [{
            render: r => r.name,
            header: 'Name'
        }, {
            render: r => r.team,
            header: 'Team'
        }, {
            render: r => r.ops.toLocaleString().replace(/^0/, ''),
            header: 'OPS'
        }, {
            render: r => r.avg.toLocaleString().replace(/^0/, ''),
            header: 'AVG'
        }]
    }));
</script>

</main>
<script>
    (function() {
        var lastHeight = 0;
        new ResizeObserver(function() {
            var h = document.body.firstElementChild.offsetHeight;
            if (h !== lastHeight && window.parent !== window) {
                lastHeight = h;
                window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
            }
        }).observe(document.body.firstElementChild);
    })();
</script>
</body>
</html>
